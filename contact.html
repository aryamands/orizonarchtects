<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | Orizon Architects</title>

  <link rel="stylesheet" href="style.css"/>

  <!-- PREMIUM FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

  <!-- ================= NAVBAR ================= -->
  <header id="navbar">
    <div class="logo">ORIZON</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="projects.html">Projects</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>

  <!-- ================= CURVED HERO ================= -->
  <section class="contact-hero-new">

    <div class="contact-hero-bg"></div>

    <div class="contact-title fade-in">
      <h1>Contact</h1>
    </div>

  </section>

  <!-- ================= CONTACT CARD ================= -->
  <section class="contact-card-section">

    <div class="contact-card fade-in">

      <!-- LEFT SIDE -->
      <div class="contact-left">

        <h2>Start a Conversation</h2>

        <p class="contact-desc">
          Tell us about your vision — we’ll turn it into reality with precision and elegance.
        </p>

        <!-- FORM -->
        <form class="contact-form">

          <input type="text" id="name" placeholder="Name" required>
          <input type="email" id="email" placeholder="Email" required>
          <textarea id="message" placeholder="Your message" rows="4" required></textarea>

          <button type="submit" class="submit-btn">Send</button>

        </form>

      </div>

      <!-- RIGHT SIDE -->
      <div class="contact-right">

        <div class="info-block">
          <h4>Email</h4>
          <p>contact@orizonarchitects.com</p>
        </div>

        <div class="info-block">
          <h4>Phone</h4>
          <p>+91 98765 43210</p>
        </div>

        <div class="info-block">
          <h4>Office</h4>
          <p>Mumbai, India</p>
        </div>

      </div>

    </div>

  </section>

  <!-- ================= MAP ================= -->
  <section class="map-section">
    <iframe 
      src="https://www.google.com/maps?q=Mumbai,India&output=embed"
      loading="lazy">
    </iframe>
  </section>

  <!-- ================= FOOTER ================= -->
  <footer>
    <p>© 2026 Orizon Architects</p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
